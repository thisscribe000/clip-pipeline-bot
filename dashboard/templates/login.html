<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Share Still</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555555;
      --danger: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 420px;
      padding: 40px;
    }

    .logo {
      width: 70px;
      height: 70px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 40px;
      margin-bottom: 24px;
    }

    .login-card h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: var(--accent);
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      padding: 16px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn-login:hover {
      background: #fff;
    }

    .error {
      color: var(--danger);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      margin-top: 16px;
    }

    .hint {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 20px;
      line-height: 1.6;
    }

    .hint code {
      background: var(--bg);
      padding: 2px 6px;
      color: var(--accent);
    }

    footer {
      margin-top: auto;
      padding: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/static/logo.svg" alt="Share Still" class="logo" />

    <h1>Share <span>Still</span></h1>
    <p class="subtitle">ADMIN DASHBOARD</p>

    <div class="login-card">
      <h2>Sign In</h2>

      <form method="POST" action="/login">
        <div class="input-group">
          <label>Admin ID</label>
          <input type="text" name="admin_id" placeholder="Enter your Telegram User ID" required />
        </div>
        <button type="submit" class="btn-login">Access Dashboard</button>
      </form>

      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
    </div>

    <p class="hint">
      Your Telegram User ID is your numerical Telegram ID.<br/>
      Find it by messaging <code>@userinfobot</code> on Telegram.
    </p>
  </div>

  <footer>
    Powered by <a href="https://paperlinkos.site" target="_blank">Paperlinkos</a> — Hosted on VPS
  </footer>
</body>
</html>
