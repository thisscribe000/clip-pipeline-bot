<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Access Only</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555555;
      --danger: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 500px;
      padding: 40px;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 32px;
    }

    .lock-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    h1 span { color: var(--danger); }

    .message {
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .btn-subscribe {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #26a5e4;
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      padding: 16px 32px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }

    .btn-subscribe:hover {
      background: #1e8dc8;
      transform: translateY(-2px);
    }

    .btn-subscribe svg {
      width: 20px;
      height: 20px;
    }

    footer {
      margin-top: auto;
      padding: 24px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/static/logo.svg" alt="Share Still" class="logo" />

    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>

    <h1>Access <span>Denied</span></h1>
    <p class="message">
      This dashboard is restricted to administrators only.<br/>
      If you believe this is an error, please contact the admin.
    </p>

    <a href="/" class="btn-subscribe">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
      Subscribe on Telegram
    </a>
  </div>

  <footer>
    Powered by <a href="https://paperlinkos.site" target="_blank">Paperlinkos</a> — Hosted on VPS
  </footer>
</body>
</html>
